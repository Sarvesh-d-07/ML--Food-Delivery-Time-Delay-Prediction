<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Delivery Delay Predictor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <header class="topbar">
        <div class="brand-dot"></div>
        <p class="brand">Food Delivery Delay Predictor</p>
      </header>

      <div class="hero-content">
        <h1>Predict Delay Minutes from Real Order Data</h1>
        <p class="subtitle">Model trained on orders_autumn_2020.csv with location, weather, timestamp, and order-level features.</p>
      </div>

      <div class="predict-panel">
        <form id="predictForm" class="form-grid">
          <div class="field"><label for="timestamp">Timestamp</label><input type="datetime-local" id="timestamp" required /></div>
          <div class="field"><label for="item_count">Item Count</label><input type="number" id="item_count" min="1" step="1" required /></div>
          <div class="field"><label for="user_lat">User Latitude</label><input type="number" id="user_lat" step="0.0001" required /></div>
          <div class="field"><label for="user_long">User Longitude</label><input type="number" id="user_long" step="0.0001" required /></div>
          <div class="field"><label for="venue_lat">Venue Latitude</label><input type="number" id="venue_lat" step="0.0001" required /></div>
          <div class="field"><label for="venue_long">Venue Longitude</label><input type="number" id="venue_long" step="0.0001" required /></div>
          <div class="field"><label for="estimated_delivery_minutes">Estimated Delivery Minutes</label><input type="number" id="estimated_delivery_minutes" min="1" step="1" required /></div>
          <div class="field"><label for="cloud_coverage">Cloud Coverage</label><input type="number" id="cloud_coverage" min="0" step="1" required /></div>
          <div class="field"><label for="temperature">Temperature</label><input type="number" id="temperature" step="0.1" required /></div>
          <div class="field"><label for="wind_speed">Wind Speed</label><input type="number" id="wind_speed" step="0.00001" required /></div>
          <div class="field"><label for="precipitation">Precipitation</label><input type="number" id="precipitation" min="0" step="0.001" required /></div>

          <button type="submit" id="submitBtn">Predict Now</button>
        </form>

        <div id="loading" class="status loading hidden">Predicting with model...</div>
        <div id="result" class="status hidden"></div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('predictForm');
    const resultEl = document.getElementById('result');
    const loadingEl = document.getElementById('loading');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        timestamp: new Date(document.getElementById('timestamp').value).toISOString().replace('T', ' ').replace('Z', ''),
        item_count: Number(document.getElementById('item_count').value),
        user_lat: Number(document.getElementById('user_lat').value),
        user_long: Number(document.getElementById('user_long').value),
        venue_lat: Number(document.getElementById('venue_lat').value),
        venue_long: Number(document.getElementById('venue_long').value),
        estimated_delivery_minutes: Number(document.getElementById('estimated_delivery_minutes').value),
        cloud_coverage: Number(document.getElementById('cloud_coverage').value),
        temperature: Number(document.getElementById('temperature').value),
        wind_speed: Number(document.getElementById('wind_speed').value),
        precipitation: Number(document.getElementById('precipitation').value),
      };

      loadingEl.classList.remove('hidden');
      resultEl.classList.add('hidden');

      try {
        const res = await fetch('http://localhost:3000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Prediction failed');

        showResult(
          `${data.status} • Predicted delay: ${data.predicted_delay_minutes} min • Predicted actual time: ${data.predicted_actual_delivery_minutes} min`,
          data.predicted_delay_minutes > 0 ? 'delayed' : 'ontime'
        );
      } catch (err) {
        showResult(`Error: ${err.message}`, 'error');
      } finally {
        loadingEl.classList.add('hidden');
      }
    });

    function showResult(message, type) {
      resultEl.textContent = message;
      resultEl.className = 'status';
      resultEl.classList.add(type);
      resultEl.classList.remove('hidden');
    }
  </script>
</body>
</html>
